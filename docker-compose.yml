services:
  api:
    image: node:20-alpine
    container_name: webhook-api
    ports:
      - "8080:8080"
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    working_dir: /app
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: development
      PORT: 8080

  weebhook:
    image: node:20-alpine
    container_name: webhook-webhook
    ports:
      - "5000:5000"
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./apps/webhook:/app
      - /app/node_modules
    working_dir: /app
    env_file:
      - ./apps/webhook/.env
    environment:
      NODE_ENV: development
      PORT: 5000
  
  web:
    image: node:20-alpine
    container_name: webhook-web
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    working_dir: /app
    env_file:
      - ./apps/web/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      # Optional: Point to your backend services
      NEXT_PUBLIC_API_URL: http://api:8080
      NEXT_PUBLIC_WEBHOOK_URL: http://webhook:5000
    # Optional: Add dependency so web starts after api & webhook
    depends_on:
      - api
      - webhook